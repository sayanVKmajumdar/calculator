<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scientific Calculator | Desmos Clone</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.8.0/math.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    
    <style>
        body { background-color: #f9f9f9; font-family: 'Segoe UI', sans-serif; }
        .keypad-button { 
            transition: all 0.1s ease;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.1rem; border-radius: 4px; height: 50px;
        }
        .keypad-button:active { transform: scale(0.95); filter: brightness(0.9); }
        .func-btn { background-color: #f1f3f4; color: #1a73e8; }
        .num-btn { background-color: #fff; border: 1px solid #dcdcdc; color: #3c4043; }
        .op-btn { background-color: #f1f3f4; color: #3c4043; font-weight: bold; }
        .enter-btn { background-color: #1a73e8; color: white; }
        .history-item:hover .delete-btn { opacity: 1; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const ScientificCalculator = () => {
            const [input, setInput] = useState("");
            const [result, setResult] = useState(null);
            const [history, setHistory] = useState([]);
            const [isRadian, setIsRadian] = useState(true);
            const [ans, setAns] = useState(0);
            const displayRef = useRef(null);

            // Configure math.js to respect Deg/Rad
            const mathConfig = math.create(math.all);

            const calculate = () => {
                if (!input) return;
                try {
                    // Replace visual operators with math.js compatible ones
                    let query = input.replace(/×/g, '*').replace(/÷/g, '/');
                    
                    // Scope for variables like 'ans'
                    const scope = { ans: ans };
                    
                    // Handle trig conversion if in degrees
                    // Simple regex injection for sin/cos/tan to multiply inner val by (pi/180)
                    if (!isRadian) {
                        query = query.replace(/(sin|cos|tan)\(([^)]+)\)/g, '$1(($2) * pi / 180)');
                    }

                    const evalResult = mathConfig.evaluate(query, scope);
                    const formattedResult = mathConfig.format(evalResult, { precision: 10 });
                    
                    const newEntry = {
                        expression: input,
                        result: formattedResult,
                        id: Date.now()
                    };

                    setResult(formattedResult);
                    setAns(formattedResult);
                    setHistory([newEntry, ...history]);
                    setInput(""); 
                } catch (error) {
                    setResult("Error");
                }
            };

            const handleBtnClick = (val) => {
                if (val === "AC") {
                    setInput("");
                    setResult(null);
                } else if (val === "DEL") {
                    setInput(prev => prev.slice(0, -1));
                } else if (val === "=") {
                    calculate();
                } else {
                    setInput(prev => prev + val);
                }
            };

            // Effect to render KaTeX on changes
            useEffect(() => {
                if (displayRef.current) {
                    const mathString = input
                        .replace(/\*/g, '\\times ')
                        .replace(/\//g, '\\div ')
                        .replace(/sqrt/g, '\\sqrt')
                        || '0';
                    katex.render(mathString, displayRef.current, { throwOnError: false });
                }
            }, [input]);

            return (
                <div className="flex flex-col md:flex-row h-screen max-w-6xl mx-auto bg-white shadow-2xl overflow-hidden">
                    
                    {/* Main Calculator Area */}
                    <div className="flex-1 flex flex-col border-r border-gray-200">
                        
                        {/* Settings Bar */}
                        <div className="p-4 border-b flex justify-between items-center bg-gray-50">
                            <div className="flex bg-gray-200 rounded-full p-1">
                                <button 
                                    onClick={() => setIsRadian(false)}
                                    className={`px-4 py-1 rounded-full text-xs font-bold ${!isRadian ? 'bg-white shadow' : 'text-gray-500'}`}
                                >DEG</button>
                                <button 
                                    onClick={() => setIsRadian(true)}
                                    className={`px-4 py-1 rounded-full text-xs font-bold ${isRadian ? 'bg-white shadow' : 'text-gray-500'}`}
                                >RAD</button>
                            </div>
                            <span className="text-gray-400 font-mono text-sm">Scientific</span>
                        </div>

                        {/* Display Screen */}
                        <div className="flex-1 p-8 flex flex-col justify-end items-end overflow-hidden">
                            <div ref={displayRef} className="text-4xl text-gray-800 mb-2 overflow-x-auto w-full text-right"></div>
                            {result !== null && (
                                <div className="text-2xl text-blue-600 font-semibold">= {result}</div>
                            )}
                        </div>

                        {/* Keypad */}
                        <div className="p-4 bg-gray-50 grid grid-cols-5 gap-2">
                            {/* Row 1 */}
                            <button onClick={() => handleBtnClick('sin(')} className="keypad-button func-btn">sin</button>
                            <button onClick={() => handleBtnClick('cos(')} className="keypad-button func-btn">cos</button>
                            <button onClick={() => handleBtnClick('tan(')} className="keypad-button func-btn">tan</button>
                            <button onClick={() => handleBtnClick('(')} className="keypad-button op-btn">(</button>
                            <button onClick={() => handleBtnClick(')')} className="keypad-button op-btn">)</button>

                            {/* Row 2 */}
                            <button onClick={() => handleBtnClick('log(')} className="keypad-button func-btn">log</button>
                            <button onClick={() => handleBtnClick('ln(')} className="keypad-button func-btn">ln</button>
                            <button onClick={() => handleBtnClick('sqrt(')} className="keypad-button func-btn">√</button>
                            <button onClick={() => handleBtnClick('^')} className="keypad-button op-btn">a^b</button>
                            <button onClick={() => handleBtnClick('!')} className="keypad-button op-btn">n!</button>

                            {/* Row 3 - Numbers & Basic Ops */}
                            <button onClick={() => handleBtnClick('7')} className="keypad-button num-btn">7</button>
                            <button onClick={() => handleBtnClick('8')} className="keypad-button num-btn">8</button>
                            <button onClick={() => handleBtnClick('9')} className="keypad-button num-btn">9</button>
                            <button onClick={() => handleBtnClick('÷')} className="keypad-button op-btn">÷</button>
                            <button onClick={() => handleBtnClick('DEL')} className="keypad-button op-btn text-red-500">DEL</button>

                            {/* Row 4 */}
                            <button onClick={() => handleBtnClick('4')} className="keypad-button num-btn">4</button>
                            <button onClick={() => handleBtnClick('5')} className="keypad-button num-btn">5</button>
                            <button onClick={() => handleBtnClick('6')} className="keypad-button num-btn">6</button>
                            <button onClick={() => handleBtnClick('×')} className="keypad-button op-btn">×</button>
                            <button onClick={() => handleBtnClick('AC')} className="keypad-button op-btn text-red-500">AC</button>

                            {/* Row 5 */}
                            <button onClick={() => handleBtnClick('1')} className="keypad-button num-btn">1</button>
                            <button onClick={() => handleBtnClick('2')} className="keypad-button num-btn">2</button>
                            <button onClick={() => handleBtnClick('3')} className="keypad-button num-btn">3</button>
                            <button onClick={() => handleBtnClick('-')} className="keypad-button op-btn">-</button>
                            <button onClick={() => handleBtnClick('ans')} className="keypad-button op-btn text-sm">ans</button>

                            {/* Row 6 */}
                            <button onClick={() => handleBtnClick('0')} className="keypad-button num-btn">0</button>
                            <button onClick={() => handleBtnClick('.')} className="keypad-button num-btn">.</button>
                            <button onClick={() => handleBtnClick('pi')} className="keypad-button num-btn">π</button>
                            <button onClick={() => handleBtnClick('+')} className="keypad-button op-btn">+</button>
                            <button onClick={() => handleBtnClick('=')} className="keypad-button enter-btn">=</button>
                        </div>
                    </div>

                    {/* Sidebar History */}
                    <div className="w-full md:w-80 bg-white p-6 overflow-y-auto border-t md:border-t-0">
                        <h2 className="text-gray-400 uppercase text-xs font-bold tracking-widest mb-4">History</h2>
                        <div className="space-y-6">
                            {history.length === 0 && <p className="text-gray-300 italic text-sm">No calculations yet</p>}
                            {history.map((item) => (
                                <div key={item.id} className="history-item group border-b border-gray-100 pb-4">
                                    <div className="text-sm text-gray-500 mb-1">{item.expression}</div>
                                    <div className="text-xl text-gray-800 font-medium">= {item.result}</div>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ScientificCalculator />);
    </script>
</body>
</html>
