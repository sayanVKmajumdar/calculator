<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Z-Calcul8</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.8.0/math.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Syne:wght@800&display=swap');
        
        body { 
            background-color: #e0e7ff; 
            font-family: 'Space Grotesk', sans-serif;
            padding: 20px;
        }

        .neo-card {
            background: white;
            border: 4px solid #111;
            box-shadow: 8px 8px 0px #111;
        }

        .neo-btn {
            @apply flex items-center justify-center border-[3px] border-[#111] transition-all duration-75 active:translate-x-[2px] active:translate-y-[2px] active:shadow-none;
            box-shadow: 4px 4px 0px #111;
            border-radius: 12px;
            font-weight: 700;
        }

        /* Color Groups */
        .btn-num { background-color: #ffffff; color: #111; }
        .btn-fn { background-color: #c7d2fe; color: #111; }
        .btn-op { background-color: #fef08a; color: #111; }
        .btn-eq { background-color: #86efac; color: #111; font-size: 1.5rem; }
        .btn-del { background-color: #fda4af; color: #111; }

        .display-area {
            font-family: 'Space Grotesk', sans-serif;
            background: #fff;
            background-image: radial-gradient(#111 1px, transparent 1px);
            background-size: 20px 20px;
        }

        h1 { font-family: 'Syne', sans-serif; text-transform: uppercase; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const App = () => {
            const [input, setInput] = useState("");
            const [result, setResult] = useState(null);
            const [isRadian, setIsRadian] = useState(true);
            const displayRef = useRef(null);

            const calculate = () => {
                try {
                    let query = input.replace(/×/g, '*').replace(/÷/g, '/');
                    if (!isRadian) {
                        query = query.replace(/(sin|cos|tan)\(([^)]+)\)/g, '$1(($2) * pi / 180)');
                    }
                    const res = math.evaluate(query || "0");
                    setResult(math.format(res, { precision: 8 }));
                } catch (e) { setResult("RIP"); }
            };

            const press = (v) => {
                if (v === "AC") { setInput(""); setResult(null); }
                else if (v === "DEL") setInput(prev => prev.slice(0, -1));
                else if (v === "=") calculate();
                else {
                    setInput(prev => prev + v);
                    setResult(null);
                }
            };

            useEffect(() => {
                if (displayRef.current) {
                    const mathString = input.replace(/\*/g, '\\cdot ').replace(/\//g, '\\div ') || '\\text{type something...}';
                    katex.render(mathString, displayRef.current, { throwOnError: false });
                }
            }, [input]);

            return (
                <div className="flex flex-col items-center justify-center min-h-screen">
                    <h1 className="text-4xl mb-6 font-extrabold tracking-tighter italic">Calc-u-Later</h1>
                    
                    <div className="w-full max-w-md neo-card rounded-[32px] overflow-hidden flex flex-col">
                        
                        {/* Header Bar */}
                        <div className="p-4 border-b-4 border-[#111] flex justify-between items-center bg-[#a5b4fc]">
                            <div className="flex gap-2">
                                <button onClick={()=>setIsRadian(!isRadian)} className="neo-btn px-4 py-1 bg-white text-xs">
                                    {isRadian ? 'RAD' : 'DEG'}
                                </button>
                            </div>
                            <div className="font-bold text-sm tracking-widest">v1.0.0-PRO</div>
                        </div>

                        {/* Display */}
                        <div className="display-area p-8 min-h-[160px] flex flex-col justify-between border-b-4 border-[#111]">
                            <div ref={displayRef} className="text-2xl font-bold text-[#111] opacity-70"></div>
                            <div className="text-5xl font-black text-right truncate text-[#111]">
                                {result ? `> ${result}` : (input ? "" : "0")}
                            </div>
                        </div>

                        {/* Buttons Grid */}
                        <div className="p-6 grid grid-cols-4 gap-4 bg-white">
                            <button onClick={()=>press('sin(')} className="neo-btn btn-fn h-12">sin</button>
                            <button onClick={()=>press('cos(')} className="neo-btn btn-fn h-12">cos</button>
                            <button onClick={()=>press('tan(')} className="neo-btn btn-fn h-12">tan</button>
                            <button onClick={()=>press('AC')} className="neo-btn btn-del h-12 uppercase text-xs">Clear</button>

                            <button onClick={()=>press('7')} className="neo-btn btn-num h-14">7</button>
                            <button onClick={()=>press('8')} className="neo-btn btn-num h-14">8</button>
                            <button onClick={()=>press('9')} className="neo-btn btn-num h-14">9</button>
                            <button onClick={()=>press('÷')} className="neo-btn btn-op h-14">÷</button>

                            <button onClick={()=>press('4')} className="neo-btn btn-num h-14">4</button>
                            <button onClick={()=>press('5')} className="neo-btn btn-num h-14">5</button>
                            <button onClick={()=>press('6')} className="neo-btn btn-num h-14">6</button>
                            <button onClick={()=>press('×')} className="neo-btn btn-op h-14">×</button>

                            <button onClick={()=>press('1')} className="neo-btn btn-num h-14">1</button>
                            <button onClick={()=>press('2')} className="neo-btn btn-num h-14">2</button>
                            <button onClick={()=>press('3')} className="neo-btn btn-num h-14">3</button>
                            <button onClick={()=>press('-')} className="neo-btn btn-op h-14">−</button>

                            <button onClick={()=>press('0')} className="neo-btn btn-num h-14">0</button>
                            <button onClick={()=>press('.')} className="neo-btn btn-num h-14">.</button>
                            <button onClick={()=>press('DEL')} className="neo-btn btn-del h-14 text-xs uppercase">Del</button>
                            <button onClick={()=>press('+')} className="neo-btn btn-op h-14">+</button>

                            <button onClick={()=>press('sqrt(')} className="neo-btn btn-fn h-12">√</button>
                            <button onClick={()=>press('pi')} className="neo-btn btn-fn h-12">π</button>
                            <button onClick={()=>press('(')} className="neo-btn btn-fn h-12">(</button>
                            <button onClick={()=>press(')')} className="neo-btn btn-fn h-12">)</button>

                            <button onClick={()=>press('=')} className="neo-btn btn-eq col-span-4 h-16">=</button>
                        </div>
                    </div>
                    <p className="mt-6 text-xs font-bold uppercase tracking-widest text-[#111] opacity-40">built for the math main character</p>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
