<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultramodern Scientific</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.8.0/math.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=JetBrains+Mono&display=swap');
        
        body { 
            background-color: #0f172a; 
            font-family: 'Outfit', sans-serif;
            color: #f8fafc;
            overflow: hidden;
        }

        /* Neon Glow Effect */
        .glow-text {
            text-shadow: 0 0 20px rgba(56, 189, 248, 0.5);
        }

        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .key-btn {
            @apply flex items-center justify-center rounded-2xl transition-all duration-150 active:scale-90 select-none;
            height: 60px;
            font-size: 1.25rem;
        }

        .key-num { @apply bg-slate-800/50 hover:bg-slate-700/50 text-slate-200; }
        .key-fn { @apply bg-sky-500/10 hover:bg-sky-500/20 text-sky-400 font-light text-sm; }
        .key-op { @apply bg-slate-700/30 hover:bg-slate-600/30 text-sky-200 font-bold; }
        .key-enter { @apply bg-sky-500 hover:bg-sky-400 text-white shadow-[0_0_15px_rgba(14,165,233,0.4)]; }
        .key-clear { @apply bg-rose-500/10 hover:bg-rose-500/20 text-rose-400 text-sm font-bold uppercase; }

        .math-display {
            font-family: 'JetBrains Mono', monospace;
            word-break: break-all;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const App = () => {
            const [input, setInput] = useState("");
            const [result, setResult] = useState(null);
            const [isRadian, setIsRadian] = useState(true);
            const displayRef = useRef(null);

            const calculate = () => {
                try {
                    let query = input.replace(/×/g, '*').replace(/÷/g, '/');
                    if (!isRadian) {
                        query = query.replace(/(sin|cos|tan)\(([^)]+)\)/g, '$1(($2) * pi / 180)');
                    }
                    const res = math.evaluate(query || "0");
                    setResult(math.format(res, { precision: 10 }));
                } catch (e) { setResult("Err"); }
            };

            const press = (v) => {
                if (v === "AC") { setInput(""); setResult(null); }
                else if (v === "DEL") setInput(prev => prev.slice(0, -1));
                else if (v === "=") calculate();
                else setInput(prev => prev + v);
            };

            useEffect(() => {
                if (displayRef.current) {
                    const mathString = input.replace(/\*/g, '\\cdot ').replace(/\//g, '\\div ') || '0';
                    katex.render(mathString, displayRef.current, { throwOnError: false });
                }
            }, [input]);

            return (
                <div className="h-screen w-full flex items-center justify-center p-4">
                    <div className="w-full max-w-md h-[850px] glass-panel rounded-[40px] shadow-2xl flex flex-col overflow-hidden">
                        
                        {/* Status Bar */}
                        <div className="px-8 pt-8 flex justify-between items-center">
                            <div className="flex gap-2 bg-slate-900/50 p-1 rounded-xl">
                                <button onClick={()=>setIsRadian(false)} className={`px-3 py-1 rounded-lg text-[10px] font-bold ${!isRadian ? 'bg-sky-500 text-white' : 'text-slate-500'}`}>DEG</button>
                                <button onClick={()=>setIsRadian(true)} className={`px-3 py-1 rounded-lg text-[10px] font-bold ${isRadian ? 'bg-sky-500 text-white' : 'text-slate-500'}`}>RAD</button>
                            </div>
                            <div className="w-2 h-2 rounded-full bg-sky-500 animate-pulse"></div>
                        </div>

                        {/* Screen */}
                        <div className="flex-1 px-8 flex flex-col justify-center text-right">
                            <div ref={displayRef} className="math-display text-3xl text-slate-400 mb-4 h-12 overflow-hidden"></div>
                            <div className="text-6xl font-semibold text-white glow-text truncate">
                                {result ? result : (input ? "" : "0")}
                            </div>
                        </div>

                        {/* Keypad */}
                        <div className="p-6 grid grid-cols-4 gap-3 bg-slate-900/40 rounded-t-[40px]">
                            {/* Functions */}
                            <button onClick={()=>press('sin(')} className="key-btn key-fn">sin</button>
                            <button onClick={()=>press('cos(')} className="key-btn key-fn">cos</button>
                            <button onClick={()=>press('tan(')} className="key-btn key-fn">tan</button>
                            <button onClick={()=>press('sqrt(')} className="key-btn key-fn">√x</button>

                            <button onClick={()=>press('log(')} className="key-btn key-fn">log</button>
                            <button onClick={()=>press('ln(')} className="key-btn key-fn">ln</button>
                            <button onClick={()=>press('^')} className="key-btn key-fn">xʸ</button>
                            <button onClick={()=>press('!')} className="key-btn key-fn">n!</button>

                            {/* Numbers & Basic Ops */}
                            <button onClick={()=>press('7')} className="key-btn key-num">7</button>
                            <button onClick={()=>press('8')} className="key-btn key-num">8</button>
                            <button onClick={()=>press('9')} className="key-btn key-num">9</button>
                            <button onClick={()=>press('÷')} className="key-btn key-op">÷</button>

                            <button onClick={()=>press('4')} className="key-btn key-num">4</button>
                            <button onClick={()=>press('5')} className="key-btn key-num">5</button>
                            <button onClick={()=>press('6')} className="key-btn key-num">6</button>
                            <button onClick={()=>press('×')} className="key-btn key-op">×</button>

                            <button onClick={()=>press('1')} className="key-btn key-num">1</button>
                            <button onClick={()=>press('2')} className="key-btn key-num">2</button>
                            <button onClick={()=>press('3')} className="key-btn key-num">3</button>
                            <button onClick={()=>press('-')} className="key-btn key-op">−</button>

                            <button onClick={()=>press('0')} className="key-btn key-num">0</button>
                            <button onClick={()=>press('.')} className="key-btn key-num">.</button>
                            <button onClick={()=>press('AC')} className="key-btn key-clear">AC</button>
                            <button onClick={()=>press('+')} className="key-btn key-op">+</button>

                            <button onClick={()=>press('(')} className="key-btn key-op">(</button>
                            <button onClick={()=>press(')')} className="key-btn key-op">)</button>
                            <button onClick={()=>press('DEL')} className="key-btn key-op text-sm">DEL</button>
                            <button onClick={()=>press('=')} className="key-btn key-enter">=</button>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
